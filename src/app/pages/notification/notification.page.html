<ion-header class="ion-no-border">
  <ion-toolbar class="notif-header">

    <ion-buttons slot="start">
      <ion-back-button defaultHref="/dashboard"></ion-back-button>
    </ion-buttons>

    <ion-title>
      Notifications
    </ion-title>

  </ion-toolbar>
</ion-header>

<ion-content class="notification-content">

  <div class="empty-container">

    <div class="illustration-wrap">
      <svg class="notif-illustration" viewBox="0 0 340 260" xmlns="http://www.w3.org/2000/svg">

        <!-- soft blob backdrop -->
        <path d="M255 60 C 300 55, 320 100, 300 140 C 285 170, 300 205, 265 210 C 230 215, 220 175, 235 145 C 248 118, 215 68, 255 60 Z"
              fill="var(--illus-blob)" opacity="0.55"/>

        <!-- dashed flight path -->
        <path d="M28 95 C 10 70, 30 40, 60 48 C 95 58, 90 95, 130 92 C 165 89, 175 60, 205 48"
              fill="none" stroke="var(--illus-path)" stroke-width="2" stroke-dasharray="5 6" stroke-linecap="round"/>

        <!-- paper airplane -->
        <g transform="translate(198,32) rotate(18)">
          <path d="M0 10 L26 0 L6 22 L9 14 L0 10 Z" fill="var(--illus-path)"/>
        </g>

        <!-- small sparkle dots -->
        <circle cx="45" cy="18" r="2.5" fill="var(--illus-path)" opacity="0.6"/>
        <circle cx="255" cy="22" r="2" fill="var(--illus-path)" opacity="0.5"/>
        <circle cx="270" cy="95" r="2" fill="var(--illus-path)" opacity="0.5"/>

        <!-- small bell (background) -->
        <g transform="translate(96,58) scale(0.55)">
          <path d="M40 8 C58 8 70 24 70 44 C70 62 76 70 82 76 L-2 76 C4 70 10 62 10 44 C10 24 22 8 40 8 Z" fill="var(--illus-bell-light)"/>
          <circle cx="40" cy="6" r="7" fill="var(--illus-bell-light)"/>
          <path d="M28 82 a12 10 0 0 0 24 0 Z" fill="var(--illus-bell-dark)"/>
        </g>

        <!-- notification badges -->
        <circle cx="30" cy="100" r="13" fill="var(--illus-badge)"/>
        <text x="30" y="105" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" font-family="inherit">2</text>

        <circle cx="82" cy="130" r="11" fill="var(--illus-badge)"/>
        <text x="82" y="134.5" text-anchor="middle" font-size="11" font-weight="700" fill="#fff" font-family="inherit">2</text>

        <!-- person lying down, phone in hand -->
        <g transform="translate(20,150)">
          <!-- legs -->
          <path d="M10 78 C 40 88, 75 84, 105 66" stroke="var(--illus-skin-dark)" stroke-width="14" stroke-linecap="round" fill="none"/>
          <path d="M12 80 L2 92" stroke="var(--illus-shoe)" stroke-width="10" stroke-linecap="round"/>
          <path d="M28 84 L20 96" stroke="var(--illus-shoe)" stroke-width="10" stroke-linecap="round"/>
          <!-- torso -->
          <path d="M60 30 C 90 34, 112 52, 118 64 C 108 76, 78 80, 55 66 C 40 57, 42 38, 60 30 Z" fill="var(--illus-shirt)"/>
          <!-- arm holding phone -->
          <path d="M95 44 C 108 40, 118 32, 122 20" stroke="var(--illus-skin)" stroke-width="10" stroke-linecap="round" fill="none"/>
          <rect x="112" y="8" width="16" height="24" rx="4" fill="var(--illus-phone)"/>
          <!-- head -->
          <circle cx="52" cy="30" r="17" fill="var(--illus-skin)"/>
          <path d="M38 24 C 38 8, 68 8, 66 24 C 66 16, 40 16, 38 24 Z" fill="var(--illus-hair)"/>
          <path d="M64 20 C 70 22, 70 34, 62 38 C 68 32, 66 22, 64 20 Z" fill="var(--illus-hair)"/>
        </g>

        <!-- big bell -->
        <g transform="translate(140,70)">
          <circle cx="70" cy="14" r="10" fill="var(--illus-bell-mid)"/>
          <path d="M70 22 C 104 22 122 48 122 82 C 122 108 132 122 142 132 L-2 132 C 8 122 18 108 18 82 C 18 48 36 22 70 22 Z"
                fill="var(--illus-bell)"/>
          <path d="M70 22 C 104 22 122 48 122 82 C 122 100 126 112 132 122 L 76 122 C 82 100 84 70 70 55 C 56 70 58 100 64 122 L8 122
                    C 14 112 18 100 18 82 C 18 48 36 22 70 22 Z"
                fill="var(--illus-bell)" opacity="0.001"/>
          <!-- highlight sweep -->
          <path d="M46 40 C 40 60 40 90 52 118" stroke="var(--illus-bell-highlight)" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.5"/>
          <path d="M46 148 a24 18 0 0 0 48 0 Z" fill="var(--illus-bell-dark)"/>
        </g>

      </svg>
    </div>

    <h2>No Notifications Right Now!</h2>

    <p>
      You're up-to-date! All updates will appear here.
    </p>

    <ion-button expand="block" class="go-back-btn" (click)="goBack()">
      Go Back
    </ion-button>

  </div>

</ion-content>
